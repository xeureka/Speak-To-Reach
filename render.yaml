services:
  # ── Backend (Docker web service) ────────────────────────────────────────────
  - type: web
    name: speak-to-reach-api
    runtime: Docker
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: NODEJS_HELPERS
        value: "0"

  # ── Frontend (static site — free on Render) ────────────────────────────────
  - type: static
    name: speak-to-reach-frontend
    staticPublishPath: frontend/dist
    buildCommand: |
      npm install -g pnpm@10.14.0 &&
      pnpm install --frozen-lockfile &&
      cd frontend && pnpm build
    routes:
      - type: rewrite
        source: /**
        destination: /index.html
